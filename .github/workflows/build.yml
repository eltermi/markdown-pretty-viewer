name: Build Markdown Pretty Viewer

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS app
        shell: bash
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - name: Verify macOS build output
        shell: bash
        run: |
          test -d "dist/Markdown Pretty Viewer.app"

      - name: Package macOS app
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Markdown Pretty Viewer.app" "MarkdownPrettyViewer-${VERSION}-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownPrettyViewer-macOS
          path: dist/MarkdownPrettyViewer-*-macOS.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            "VERSION=$env:GITHUB_REF_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "VERSION=$($env:GITHUB_SHA.Substring(0,7))" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows app
        shell: cmd
        run: call build_windows.bat

      - name: Verify Windows build output
        shell: cmd
        run: |
          if not exist "dist\Markdown Pretty Viewer\Markdown Pretty Viewer.exe" (
            echo Windows executable not found.
            exit /b 1
          )

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist\Markdown Pretty Viewer" `
            -DestinationPath "dist\MarkdownPrettyViewer-$($env:VERSION)-Windows.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownPrettyViewer-Windows
          path: dist/MarkdownPrettyViewer-*-Windows.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
